name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Run tests
        run: flutter test

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build Example APK
        run: |
          cd example
          flutter build apk --debug

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build Example iOS (No Code Sign)
        run: |
          cd example
          flutter build ios --no-codesign --debug

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Enable macOS support
        run: flutter config --enable-macos-desktop
      - name: Build Example macOS
        run: |
          cd example
          flutter build macos --debug

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Enable Windows support
        run: flutter config --enable-windows-desktop
      - name: Build Example Windows
        run: |
          cd example
          flutter build windows --debug
      - name: Run Plugin Tests
        run: flutter test
      - name: Run Windows C++ Tests
        run: .\example\build\windows\x64\plugins\auto_start_flutter\Debug\auto_start_flutter_test.exe

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get
      - name: Enable Linux support
        run: flutter config --enable-linux-desktop
      - name: Build Example Linux
        run: |
          cd example
          flutter build linux --debug
      - name: Run Plugin Tests
        run: flutter test
      - name: Run Linux C++ Tests
        run: ./example/build/linux/x64/debug/plugins/auto_start_flutter/auto_start_flutter_test
